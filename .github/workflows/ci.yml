name: CI/Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Type check
        run: pnpm exec tsc --noEmit || true
        
      - name: Lint
        run: pnpm exec eslint . || true
        
      - name: Build
        run: pnpm build
        
      - name: Run tests
        run: pnpm test || pnpm exec vitest run || true
        
      - name: Verify output
        run: |
          test -d dist && echo "✓ Build output verified" || true
          
      - name: Security audit
        run: pnpm audit --audit-level=moderate || true